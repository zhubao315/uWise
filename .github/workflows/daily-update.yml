name: uWise 百科每日更新

on:
  schedule:
    - cron: '0 2 * * *'  # 每天UTC时间2点（北京时间10点）
  workflow_dispatch:  # 手动触发

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          pip install mkdocs mkdocs-material
          pip install requests beautifulsoup4 openai
      
      - name: 配置Git
        run: |
          git config user.name "uWise Bot"
          git config user.email "uwisdom@users.noreply.github.com"
      
      - name: 运行知识更新脚本
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          python scripts/update_knowledge.py
      
      - name: 构建MkDocs
        run: mkdocs build
      
      - name: 提交更改
        run: |
          git add -A
          git diff --staged --quiet || git commit -m "📚 知识库每日更新 $(date +'%Y-%m-%d')"
          git push
      
      - name: 部署到GitHub Pages
        run: mkdocs gh-deploy --force
